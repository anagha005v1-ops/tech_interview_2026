<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FOSS Club Events</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>FOSS Club</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#events">Events</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- EVENTS -->
  <section id="events">
    <h2>Upcoming Events</h2>

    <div class="card-container">

      <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>GitHub Basics</h3>
        <p>April 10, 2026</p>
        <p>Learn basics of GitHub</p>
        <a href="register.html"><button>Register</button></a>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Web Development</h3>
        <p>April 15, 2026</p>
        <p>HTML, CSS, JavaScript</p>
        <a href="register.html"><button>Register</button></a>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Python Workshop</h3>
        <p>April 20, 2026</p>
        <p>Introduction to Python</p>
        <a href="register.html"><button>Register</button></a>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>AI Basics</h3>
        <p>April 25, 2026</p>
        <p>Explore AI concepts</p>
        <a href="register.html"><button>Register</button></a>
      </div>

    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h2>Contact Us</h2>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Your Message" required></textarea>
      <button type="submit">Send</button>
    </form>
  </section>

</body>
</html>
